name: Publish Editor API Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ots-web-editor-api

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Verify LFS assets are present
        run: |
          min_wasm_bytes=1000000
          min_data_bytes=1000000
          actual_wasm_bytes=$(wc -c < public/webmscore.lib.wasm)
          actual_data_bytes=$(wc -c < public/webmscore.lib.data)
          actual_mem_wasm_bytes=$(wc -c < public/webmscore.lib.mem.wasm)
          echo "webmscore.lib.wasm bytes: ${actual_wasm_bytes}"
          echo "webmscore.lib.data bytes: ${actual_data_bytes}"
          echo "webmscore.lib.mem.wasm bytes: ${actual_mem_wasm_bytes}"
          if [ "${actual_wasm_bytes}" -lt "${min_wasm_bytes}" ] || [ "${actual_data_bytes}" -lt "${min_data_bytes}" ]; then
            echo "LFS artifacts look unresolved (files are too small)."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.editor-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
